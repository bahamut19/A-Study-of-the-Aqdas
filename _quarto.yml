project:
  type: book
  output-dir: _book

book:
  title: "Achieving True Liberation"
  subtitle: "An Exploration of the Kitab-i-Aqdas"
  author: "Joshua W. Adams"
  downloads: [pdf, docx, epub]
  search: true
  page-navigation: true
  reader-mode: true
  sidebar:
    style: docked
    search: true
  cover-image: "images/Crimson Ark Cover.png"
  
  chapters:
    - index.qmd
    - intro.qmd
    - part: "Part 1: The Pillars of Belief"
      chapters: 
        - belief in god.qmd
        - belief in the human soul.qmd
        - belief in the worlds.qmd
        - belief in the day.qmd
        - belief in the commands of god.qmd
        - belief in the manifestation of god.qmd
    - part: "Part 2: The Relationship with God"
      chapters: 
        - foundational virtues.qmd
        - obligatory prayer.qmd
        - recitation.qmd
        - remembrance.qmd
        - reflection.qmd
        - honoring god.qmd
        - unity.qmd
    - part: "Part 3: Rights and Responsibilities"
      chapters: 
        - from birth to maturity.qmd
        - maturity to devotion.qmd
        - the private self.qmd
        - constructive social life.qmd
        - protective social life.qmd
        - relationships.qmd
        - trusteeship.qmd
        - consultation.qmd
    - part: "Part 4: Leadership After Baha'u'llah"
      chapters: 
        - houses of justice.qmd
        - political leadership.qmd
        - spiritual leadership.qmd
        - spiritual successorship.qmd
        - peace.qmd
        - serving the cause.qmd
    - part: "Appendices"
      chapters:
        - Appendix A.qmd
        - Appendix B.qmd
        - Appendix C.qmd
        - Appendix D.qmd
        - Appendix E.qmd
        - Appendix F.qmd
        - Appendix G.qmd
        - Appendix H.qmd
        - Appendix I.qmd

format:
  html:
    theme:
      light: minty
    toc: true
    toc-depth: 3
    number-sections: true
    smooth-scroll: true
    anchor-sections: true
    code-copy: false
    link-external-newwindow: true
    page-footer:
      left: "© 2026 Joshua W. Adams"
      center: "Achieving True Liberation"
      right: "ISBN: 978-XXXXXXXXXX"
    grid:
      sidebar-width: 275px
      body-width: 900px
      margin-width: 250px

  pdf:
    pdf-engine: xelatex
    documentclass: book
    titlepage: false
    output-file: "Achieving-True-Liberation-Study-of-Aqdas.pdf"
    fontsize: 10pt
    toc-depth: 1
    number-depth: 2
    tbl-longtable: true
    mainfont: "TeX Gyre Pagella"
    include-before-body:
      - _frontmatter.tex
    geometry:
      - paperwidth=6in
      - paperheight=9in
      - top=0.75in
      - bottom=0.75in
      - inner=0.875in
      - outer=0.625in
    include-in-header:
      text: |
        \hfuzz=10pt
        \newfontfamily\arabicfont[Script=Arabic,Scale=MatchLowercase]{Amiri}
        \usepackage{tocloft}
        \setlength{\cftbeforechapskip}{0pt}
        \setlength{\cftbeforesecskip}{0pt}

  epub:
    toc: true
    toc-depth: 2
    number-sections: false
    output-file: "Achieving-True-Liberation.epub"
    cover-image: "images/Crimson Ark Cover.png"
  
  docx:
    reference-doc: reference1.docx
    toc-depth: 1
    number-depth: 3

editor: visual